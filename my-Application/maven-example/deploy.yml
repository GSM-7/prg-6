---
- name: Deploy Maven Artifact
  hosts: web
  become: true

  tasks:
    - name: Ensure app directory exists
      file:
        path: /opt/myapp
        state: directory
        owner: jenkins
        group: jenkins
        mode: '0755'

    - name: Copy JAR file
      copy:
        src: /var/lib/jenkins/workspace/prg8/my-Application/maven-example/target/maven-example-1.0-SNAPSHOT.jar
        dest: /opt/myapp/maven-example-1.0-SNAPSHOT.jar
        remote_src: yes

    - name: Run application
      shell: nohup java -jar /var/lib/jenkins/workspace/prg8/my-Application/apps/myapp-1.0-SNAPSHOT.jar &
      args:
        chdir: /var/lib/jenkins/workspace/prg8/my-Application/apps
